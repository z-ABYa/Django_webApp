{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card fade-up">

    <div class="auth-logo">
      <div class="auth-logo-mark">✦ Django <span>Unblogged</span></div>
    </div>

    <h1 class="auth-title">Choose a new password</h1>
    <p class="auth-subtitle">Make it something you'll remember.</p>

    <form method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ink mt-sm" style="width:100%; justify-content:center;">
        Set New Password
      </button>
    </form>

  </div>
</div>

{% endblock content %}
