{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card fade-up">

    <div class="auth-logo">
      <div class="auth-logo-mark">✦ Django <span>Unblogged</span></div>
    </div>

    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-subtitle">
      Enter your email and we'll send you a reset link.
    </p>

    <form method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ink mt-sm" style="width:100%; justify-content:center;">
        Send Reset Link
      </button>
    </form>

    <hr class="auth-divider">

    <p class="auth-footer-text">
      Remembered it? <a href="{% url 'login' %}">Log in</a>
    </p>

  </div>
</div>

{% endblock content %}
