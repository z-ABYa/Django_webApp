{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card fade-up">

    <div class="auth-logo">
      <div class="auth-logo-mark">✦ Django <span>Unblogged</span></div>
    </div>

    <h1 class="auth-title">Join today</h1>
    <p class="auth-subtitle">Create an account and start writing.</p>

    <form method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ink mt-sm" style="width:100%; justify-content:center;">
        Create Account
      </button>
    </form>

    <hr class="auth-divider">

    <p class="auth-footer-text">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </p>

  </div>
</div>

{% endblock content %}
