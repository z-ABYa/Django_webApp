{% extends 'blog/base.html' %}
{% block content %}

<div class="page-narrow">
  <div class="logout-wrap fade-up">
    <div class="logout-mark">✦</div>
    <h2 class="font-display" style="font-size:1.6rem; margin-bottom:0.5rem;">
      You've been logged out.
    </h2>
    <p class="text-muted-ink" style="margin-bottom:2rem;">
      See you next time.
    </p>
    <div style="display:flex; gap:0.75rem; justify-content:center;">
      <a class="btn-ink" href="{% url 'login' %}">Log back in</a>
      <a class="btn-ink btn-outline" href="{% url 'blog-home' %}">Browse posts</a>
    </div>
  </div>
</div>

{% endblock content %}
