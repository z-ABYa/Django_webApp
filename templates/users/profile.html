{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="page-narrow" style="padding-top:1rem;">

  <!-- Profile header -->
  <div class="profile-header fade-up">
    <div class="profile-avatar-wrap">
      <img class="profile-avatar"
           src="{{ user.profile.image.url }}"
           alt="{{ user.username }}'s avatar">
    </div>
    <div>
      <h2 class="profile-username">{{ user.username }}</h2>
      <div class="profile-email">{{ user.email }}</div>
      <a href="{% url 'user-posts' user.username %}"
         class="font-mono text-accent mt-xs d-inline-block"
         style="font-size:0.75rem; letter-spacing:0.05em; text-transform:uppercase;">
        View my posts →
      </a>
    </div>
  </div>

  <!-- Edit form -->
  <div class="form-section fade-up fade-up-delay-1">
    <div class="form-section-title">Edit Profile</div>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-3">
        <div class="form-section-title" style="border-bottom:none; margin-bottom:0.75rem;">
          Account Info
        </div>
        {{ u_form|crispy }}
      </div>

      <hr class="divider">

      <div class="mb-3">
        <div class="form-section-title" style="border-bottom:none; margin-bottom:0.75rem;">
          Profile Photo
        </div>
        {{ p_form|crispy }}
      </div>

      <button type="submit" class="btn-ink">Save Changes</button>
    </form>
  </div>

</div>

{% endblock content %}
